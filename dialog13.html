<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Dialog-Puzzle</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #f0f3f7;
            --success: #00b894;
            --error: #d63031;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { text-align: center; font-size: 1.5rem; color: var(--primary); }
        p.instruction { text-align: center; margin-bottom: 20px; font-size: 0.95rem; color: #636e72; }

        .puzzle-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .bubble {
            background: var(--secondary);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            position: relative;
            font-size: 1.05rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .bubble:hover { transform: translateY(-2px); background: var(--primary); }
        .bubble.selected {
            opacity: 0.3;
            transform: scale(0.95);
            pointer-events: none;
        }

        .solution-area {
            border-top: 2px dashed #dfe6e9;
            padding-top: 20px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bubble-placed {
            background: white;
            border: 2px solid var(--primary);
            color: var(--text);
            padding: 12px 18px;
            border-radius: 15px;
            font-size: 1rem;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .feedback {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            min-height: 24px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        #check-btn { background: var(--success); color: white; display: none; }
        #reset-btn { background: #636e72; color: white; }

        .correct { color: var(--success); }
        .wrong { color: var(--error); }
    </style>
</head>
<body>

<div class="container">
    <h1>Dialog-Puzzle</h1>
    <p class="instruction">Bringe den Dialog in die richtige Reihenfolge (Klicke die Sprechblasen an).</p>

    <div class="puzzle-area" id="puzzle-area">
        <!-- Inhalte werden per JS gemischt eingefügt -->
    </div>

    <div class="solution-area" id="solution-area">
        <!-- Hier erscheinen die gewählten Sätze -->
    </div>

    <div id="feedback" class="feedback"></div>

    <div class="controls">
        <button id="reset-btn" onclick="resetPuzzle()">Löschen & Neustart</button>
        <button id="check-btn" onclick="checkSolution()">Prüfen</button>
    </div>
</div>

<script>
    const originalDialog = [
        { id: 1, text: "Привет! Что ты делаешь?", role: "A" },
        { id: 2, text: "Я работаю, у меня важный проект.", role: "B" },
        { id: 3, text: "А можно посмотреть? Это интересно!", role: "A" },
        { id: 4, text: "Не мешай мне, пожалуйста.", role: "B" }
    ];

    let currentOrder = [];

    function initPuzzle() {
        const puzzleArea = document.getElementById('puzzle-area');
        puzzleArea.innerHTML = '';
        
        // Mischen der Sätze
        const shuffled = [...originalDialog].sort(() => Math.random() - 0.5);
        
        shuffled.forEach(item => {
            const div = document.createElement('div');
            div.className = 'bubble';
            div.innerText = item.text;
            div.id = 'sentence-' + item.id;
            div.onclick = () => selectSentence(item);
            puzzleArea.appendChild(div);
        });
    }

    function selectSentence(item) {
        currentOrder.push(item);
        document.getElementById('sentence-' + item.id).classList.add('selected');
        
        const solArea = document.getElementById('solution-area');
        const div = document.createElement('div');
        div.className = 'bubble-placed';
        div.innerText = (currentOrder.length) + ". " + item.text;
        solArea.appendChild(div);

        if (currentOrder.length === originalDialog.length) {
            document.getElementById('check-btn').style.display = 'block';
        }
    }

    function checkSolution() {
        const feedback = document.getElementById('feedback');
        const isCorrect = currentOrder.every((val, index) => val.id === originalDialog[index].id);

        if (isCorrect) {
            feedback.innerHTML = '<span class="correct">Perfekt! Der Dialog ist logisch.</span>';
        } else {
            feedback.innerHTML = '<span class="wrong">Die Reihenfolge passt noch nicht. Versuch es noch einmal!</span>';
        }
    }

    function resetPuzzle() {
        currentOrder = [];
        document.getElementById('solution-area').innerHTML = '';
        document.getElementById('feedback').innerHTML = '';
        document.getElementById('check-btn').style.display = 'none';
        initPuzzle();
    }

    // Start
    initPuzzle();
</script>

</body>
</html>
