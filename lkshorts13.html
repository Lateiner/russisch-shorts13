<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Lernkartei: Abweisungen & Verben</title>
    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-green: #27ae60;
            --light-green: #eafaf1;
            --bg-color: #f4f7f6;
            --text-color: #2c3e50;
            --card-white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: var(--dark-green);
            text-align: center;
            margin-bottom: 10px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress {
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--dark-green);
            font-size: 1.1rem;
        }

        /* 3D Card Container */
        .flashcard-container {
            width: 100%;
            perspective: 1000px;
            cursor: pointer;
            aspect-ratio: 3 / 2;
            margin-bottom: 30px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 15px;
            border: 4px solid var(--primary-green);
            background-color: var(--card-white);
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: var(--light-green);
        }

        .content {
            font-size: 1.8rem;
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
        }

        .note {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 15px;
            font-style: italic;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .btn {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--primary-green);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn:hover {
            background-color: var(--dark-green);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: #95a5a6;
            grid-column: span 1;
        }

        .btn-wide {
            grid-column: span 2;
        }

        .keyboard-hint {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #95a5a6;
            text-align: center;
            line-height: 1.6;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .content { font-size: 1.4rem; }
            .flashcard-container { aspect-ratio: 1 / 1; }
            .keyboard-hint { display: none; } /* Verberge Tipps auf Mobile */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Russisch Vokabeltrainer</h1>
        
        <div class="progress" id="progress-indicator">1 / 50</div>

        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard" id="card-element">
                <div class="card-face card-front">
                    <div class="content" id="front-text">Lade...</div>
                    <div class="note" id="front-note"></div>
                </div>
                <div class="card-face card-back">
                    <div class="content" id="back-text">Lade...</div>
                    <div class="note" id="back-note"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="prevCard()">← Vorherige</button>
            <button class="btn" onclick="nextCard()">Nächste →</button>
            <button class="btn btn-secondary" onclick="resetToStart()">An den Anfang</button>
            <button class="btn btn-secondary" onclick="shuffleCards()">Mischen</button>
        </div>

        <div class="keyboard-hint">
            Tastatur: <b>Leertaste/Enter</b> = Drehen | <b>Pfeiltasten</b> = Navigation<br>
            <b>Pos1 (Home)</b> = Zum Anfang
        </div>
    </div>

    <script>
        // Die Vokabelliste als Array von Objekten
        const rawData = [
            ["1. меша́ть / помеша́ть", "stören"],
            ["2. оставля́ть / оста́вить", "lassen, verlassen"],
            ["3. отстава́ть / отста́ть", "zurückbleiben, (hier:) in Ruhe lassen / in Frieden lassen"],
            ["4. отвали́вать / отвали́ть", "wegsegeln, (hier:) abziehen / abhauen / sich verpissen"],
            ["5. рабо́тать / порабо́тать", "arbeiten"],
            ["6. отдыха́ть / отдохну́ть", "sich ausruhen / Urlaub machen"],
            ["7. говори́ть / сказа́ть", "sprechen / sagen"],
            ["8. писа́ть / написа́ть", "schreiben"],
            ["9. слы́шать / услы́шать", "hören"],
            ["10. понима́ть / поня́ть", "verstehen"],
            ["11. смотре́ть / посмотре́ть", "schauen / ansehen"],
            ["12. гуля́ть / погуля́ть", "spazieren gehen"],
            ["13. надоеда́ть / надое́сть", "auf die Nerven gehen / satt haben"],
            ["14. учи́ться / вы́учиться", "lernen / studieren"],
            ["15. занима́ться / позанима́ться", "sich beschäftigen / lernen"],
            ["16. хоте́ть / захоте́ть", "wollen"],
            ["17. прекраща́ть / прекрати́ть", "aufhören / einstellen"],
            ["18. спо́рить / поспо́рить", "streiten / debattieren"],
            ["19. проси́ть / попроси́ть", "bitten"],
            ["20. тре́бовать / потре́бовать", "fordern"],
            ["21. не меша́й мне", "stör mich nicht"],
            ["22. оста́вь меня́ в поко́е", "lass mich in Ruhe"],
            ["23. отста́нь", "lass mich (in Frieden) / rück mir von der Pelle"],
            ["24. отвали́", "hau ab / verpiss dich"],
            ["25. поко́й", "Ruhe / Frieden"],
            ["26. ва́риант", "Variante"],
            ["27. ве́жливый", "höflich"],
            ["28. ме́нее", "weniger"],
            ["29. носси́тель языка́", "Muttersprachler"],
            ["30. речь", "Rede / Sprache"],
            ["31. сло́во", "Wort"],
            ["32. коммента́рий", "Kommentar"],
            ["33. ва́жный", "wichtig"],
            ["34. прое́кт", "Projekt"],
            ["35. библиоте́ка", "Bibliothek"],
            ["36. о́фис", "Büro"],
            ["37. шко́льный двор", "Schulhof"],
            ["38. ситуа́ция", "Situation"],
            ["39. конте́кст", "Kontext"],
            ["40. интона́ция", "Betonung / Tonfall"],
            ["41. разгово́р", "Gespräch"],
            ["42. друг", "Freund"],
            ["43. брат", "Bruder"],
            ["44. учи́тель", "Lehrer"],
            ["45. незнако́мец", "Fremder"],
            ["46. сейча́с", "jetzt"],
            ["47. сего́дня", "heute"],
            ["48. злой", "böse / wütend"],
            ["49. ску́чный", "langweilig"],
            ["50. пожа́луйста", "bitte (als Höflichkeitsform)"]
        ];

        let cards = rawData.map(item => ({
            front: item[0],
            back: item[1],
            noteF: item[2] || "",
            noteB: item[3] || ""
        }));

        let currentIndex = 0;
        const cardElement = document.getElementById('card-element');
        const frontText = document.getElementById('front-text');
        const backText = document.getElementById('back-text');
        const frontNote = document.getElementById('front-note');
        const backNote = document.getElementById('back-note');
        const progressIndicator = document.getElementById('progress-indicator');

        function updateCard() {
            // Reset Flip-State
            cardElement.classList.remove('is-flipped');
            
            // Timeout wartet kurz bis Karte zurückgedreht ist (optional)
            setTimeout(() => {
                const card = cards[currentIndex];
                frontText.innerText = card.front;
                backText.innerText = card.back;
                frontNote.innerText = card.noteF;
                backNote.innerText = card.noteB;
                
                // Dynamische Schriftgröße
                adjustFontSize(frontText);
                adjustFontSize(backText);

                progressIndicator.innerText = `${currentIndex + 1} / ${cards.length}`;
            }, 100);
        }

        function adjustFontSize(element) {
            const length = element.innerText.length;
            if (length > 50) {
                element.style.fontSize = "1.2rem";
            } else if (length > 25) {
                element.style.fontSize = "1.5rem";
            } else {
                element.style.fontSize = "1.8rem";
            }
        }

        function flipCard() {
            cardElement.classList.toggle('is-flipped');
        }

        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        }

        function resetToStart() {
            currentIndex = 0;
            updateCard();
        }

        function shuffleCards() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case " ":
                case "Enter":
                    e.preventDefault(); // Verhindert Scrollen bei Leertaste
                    flipCard();
                    break;
                case "ArrowRight":
                    nextCard();
                    break;
                case "ArrowLeft":
                    prevCard();
                    break;
                case "Home":
                    resetToStart();
                    break;
            }
        });

        // Initiale Anzeige
        updateCard();

    </script>
</body>
</html>
