<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Übung: Der Ton macht die Musik</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --accent: #9b59b6;
            --neutral: #34495e;
            --success: #27ae60;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #eee;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { color: var(--neutral); font-size: 1.4rem; }

        .audio-card {
            background: #f8f9fa;
            border: 2px solid #eee;
            border-radius: 15px;
            padding: 40px 20px;
            margin: 20px 0;
            transition: all 0.3s;
        }

        .play-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: transform 0.2s;
        }

        .play-btn:active { transform: scale(0.9); }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.2s;
        }

        .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #fdf7ff; }

        .correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        #feedback { margin-top: 20px; font-weight: bold; min-height: 1.2rem; }

        .nav-btns {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .main-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: var(--neutral);
            color: white;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hör-Quiz: Die Betonung</h1>
    <p>Höre dir das Wort an. Wie klingt die Person?</p>

    <div class="audio-card">
        <button class="play-btn" onclick="playAudio()" title="Anhören">
            <span>▶</span>
        </button>
        <p style="margin-top: 15px; font-weight: bold; font-size: 1.2rem;">Отстань</p>
    </div>

    <div class="options-grid" id="options">
        <!-- Buttons per JS -->
    </div>

    <div id="feedback"></div>

    <div class="nav-btns">
        <button id="next-btn" class="main-btn" onclick="nextQuestion()">Nächste Aufgabe</button>
        <button id="reset-btn" class="main-btn" onclick="resetQuiz()">Neustart</button>
    </div>
</div>

<script>
    const questions = [
        { emotion: "genervt", pitch: 0.8, rate: 0.9, feedback: "Richtig! Die Stimme ist tief und kurz – typisch genervt." },
        { emotion: "wütend", pitch: 1.5, rate: 1.2, feedback: "Korrekt! Lauter und schneller – das ist Wut." },
        { emotion: "bittend", pitch: 1.2, rate: 0.7, feedback: "Genau! Lang gezogen und sanfter – fast wie ein Flehen." }
    ];

    let currentIdx = 0;

    function playAudio() {
        const q = questions[currentIdx];
        const msg = new SpeechSynthesisUtterance("Отстань");
        msg.lang = 'ru-RU';
        msg.pitch = q.pitch;
        msg.rate = q.rate;
        window.speechSynthesis.speak(msg);
    }

    function initQuestion() {
        const q = questions[currentIdx];
        const optionsDiv = document.getElementById('options');
        document.getElementById('feedback').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        optionsDiv.innerHTML = "";

        // Zufällige Auswahlmöglichkeiten (immer die 3 gleichen)
        ["genervt", "wütend", "bittend"].forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.charAt(0).toUpperCase() + opt.slice(1);
            btn.onclick = () => checkAnswer(opt, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(choice, btn) {
        const correct = questions[currentIdx].emotion;
        const allBtns = document.querySelectorAll('.option-btn');
        
        allBtns.forEach(b => b.disabled = true);

        if (choice === correct) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerHTML = `<span style="color:var(--success)">${questions[currentIdx].feedback}</span>`;
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerHTML = `<span style="color:var(--error)">Nicht ganz. Hör noch mal genau hin!</span>`;
        }

        if (currentIdx < questions.length - 1) {
            document.getElementById('next-btn').style.display = "block";
        } else {
            document.getElementById('reset-btn').style.display = "block";
        }
    }

    function nextQuestion() {
        currentIdx++;
        initQuestion();
    }

    function resetQuiz() {
        currentIdx = 0;
        document.getElementById('reset-btn').style.display = "none";
        initQuestion();
    }

    // Start
    window.onload = initQuestion;
</script>

</body>
</html>
